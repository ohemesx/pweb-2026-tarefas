<!DOCTYPE html>
<html>
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
    <title>Blog</title>
</head>
<body>
    <header>
        <h1>Blog</h1>
        <a href="{% url 'index' %}">Home</a>
    </header>

    <h2>Posts recentes</h2>
    <ul>
        {% for post in posts %}
            <li>
                <a href="{% url 'post' post.id %}">{{ post.titulo }}</a> - {{ post.data_publicacao }}
            </li>
        {% endfor %}
    </ul>

    <footer>
        <p>Blog Desenvolvido por Hemerson Daniel</p>
    </footer>
</body>
</html>
